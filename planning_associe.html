<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Planning Meyra">
<title>Planning DJ Meyra</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f7;color:#1c1c1e;padding:16px 16px 40px}
.header{margin-bottom:16px}
.header h1{font-size:22px;font-weight:700}
.header p{font-size:13px;color:#8e8e93;margin-top:2px}
.sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;background:#e8fbe8;color:#1a7f37;padding:4px 10px;border-radius:8px;margin-top:6px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px}
.vue-toggle{display:flex;gap:8px;margin-bottom:12px}
.vue-toggle button{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid #e5e5ea;background:#fff;color:#1c1c1e}
.vue-toggle button.active{background:#1c1c1e;color:#fff;border-color:#1c1c1e}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav{background:none;border:none;font-size:26px;cursor:pointer;padding:2px 10px;color:#1a56db}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:#8e8e93;padding:4px 0}
.cal-day{text-align:center;padding:7px 2px;border-radius:8px;font-size:14px;min-height:36px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px}
.cal-day.libre{background:#e8fbe8;color:#1a7f37}
.cal-day.reserve{background:#ffe5e5;color:#cc0000;font-weight:700}
.cal-day.attente{background:#fff8e1;color:#b8860b;font-weight:700}
.cal-day.today{outline:2px solid #1a56db;outline-offset:-1px}
.cal-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
.legende{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.legende span{font-size:12px;padding:5px 10px;border-radius:8px;font-weight:500}
.presta-item{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border-left:5px solid #e5e5ea}
.presta-item.confirme{border-left-color:#34c759}
.presta-item.attente{border-left-color:#ff9500}
.presta-item.annule{border-left-color:#ff3b30;opacity:.6}
.presta-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.presta-type{font-size:15px;font-weight:700}
.presta-montant{font-size:15px;font-weight:700;color:#1a56db}
.presta-row{font-size:13px;color:#8e8e93;margin-bottom:2px}
.badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;margin-top:5px}
.badge.confirme{background:#e8fbe8;color:#1a7f37}
.badge.attente{background:#fff8e1;color:#b8860b}
.badge.annule{background:#ffe5e5;color:#cc0000}
.empty-note{font-size:13px;color:#c7c7cc;text-align:center;padding:20px 0}
.lecture-seule{background:#fff8e1;border-radius:10px;padding:10px 14px;font-size:13px;color:#b8860b;margin-bottom:12px;text-align:center}
select{font-size:15px;font-weight:700;border:none;background:none;color:#1c1c1e;cursor:pointer;padding:4px;-webkit-appearance:auto}
</style>
</head>
<body>
 
<div class="header">
  <h1>📅 Planning DJ Meyra</h1>
  <p>Consultation uniquement</p>
  <div class="sync-badge">🟢 <span id="sync-status">Connexion...</span></div>
</div>
 
<div class="lecture-seule">👁 Mode lecture seule — Contacte DJ Meyra pour toute modification</div>
 
<div class="vue-toggle">
  <button class="active" onclick="setVue('cal')">📅 Calendrier</button>
  <button onclick="setVue('list')">📋 Liste</button>
</div>
 
<div id="vue-cal">
  <div class="card">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <div style="display:flex;gap:6px;align-items:center">
        <select id="cal-select-mois" onchange="calSelectMois()">
          <option value="0">Janvier</option><option value="1">Février</option><option value="2">Mars</option>
          <option value="3">Avril</option><option value="4">Mai</option><option value="5">Juin</option>
          <option value="6">Juillet</option><option value="7">Août</option><option value="8">Septembre</option>
          <option value="9">Octobre</option><option value="10">Novembre</option><option value="11">Décembre</option>
        </select>
        <select id="cal-select-annee" onchange="calSelectAnnee()"></select>
      </div>
      <button class="cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="legende">
    <span style="background:#e8fbe8;color:#1a7f37">🟢 Libre</span>
    <span style="background:#ffe5e5;color:#cc0000">🔴 Confirmé</span>
    <span style="background:#fff8e1;color:#b8860b">🟡 En attente</span>
  </div>
</div>
 
<div id="vue-list" style="display:none">
  <div id="liste-prestations"></div>
</div>
 
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
 
const firebaseConfig = {
  apiKey: "AIzaSyBv_0pZASNBoVNlQ4-ztKsXwVrIN0dMQ-U",
  authDomain: "dj-meyra.firebaseapp.com",
  databaseURL: "https://dj-meyra-default-rtdb.firebaseio.com",
  projectId: "dj-meyra",
  storageBucket: "dj-meyra.firebasestorage.app",
  messagingSenderId: "161733120497",
  appId: "1:161733120497:web:6d51fac4eb4d5730abf450"
};
 
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
var prestations = [];
var calDate = new Date();
var vue = 'cal';
 
function fmt(n){return n.toLocaleString('fr-FR')+' €';}
 
function calNav(dir){calDate=new Date(calDate.getFullYear(),calDate.getMonth()+dir,1);render();}
function calSelectMois(){calDate.setMonth(parseInt(document.getElementById('cal-select-mois').value));render();}
function calSelectAnnee(){calDate.setFullYear(parseInt(document.getElementById('cal-select-annee').value));render();}
window.calNav=calNav;window.calSelectMois=calSelectMois;window.calSelectAnnee=calSelectAnnee;
 
function setVue(v){
  vue=v;
  document.getElementById('vue-cal').style.display=v==='cal'?'block':'none';
  document.getElementById('vue-list').style.display=v==='list'?'block':'none';
  document.querySelectorAll('.vue-toggle button').forEach(function(b,i){b.classList.toggle('active',(v==='cal'&&i===0)||(v==='list'&&i===1));});
  render();
}
window.setVue=setVue;
 
function render(){
  var y=calDate.getFullYear(),m=calDate.getMonth();
  var selMois=document.getElementById('cal-select-mois');
  if(selMois)selMois.value=m;
  var selAnnee=document.getElementById('cal-select-annee');
  if(selAnnee){
    var opts='';
    for(var a=2024;a<=new Date().getFullYear()+3;a++)opts+='<option value="'+a+'"'+(a===y?' selected':'')+'>'+a+'</option>';
    selAnnee.innerHTML=opts;
  }
  // Calendrier
  var first=new Date(y,m,1).getDay();first=(first+6)%7;
  var days=new Date(y,m+1,0).getDate(),today=new Date();
  var jours=['L','M','M','J','V','S','D'],html='';
  jours.forEach(function(j){html+='<div class="cal-day-name">'+j+'</div>';});
  for(var i=0;i<first;i++)html+='<div style="min-height:36px"></div>';
  for(var d=1;d<=days;d++){
    var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var p=prestations.find(function(x){return x.date===ds&&x.statut!=='annule';});
    var isTod=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    var cls='cal-day '+(p?(p.statut==='confirme'?'reserve':'attente'):'libre')+(isTod?' today':'');
    html+='<div class="'+cls+'">'+d+(p?'<div class="cal-dot"></div>':'')+'</div>';
  }
  document.getElementById('cal-grid').innerHTML=html;
  // Liste
  var sorted=[...prestations].filter(function(p){return p.statut!=='annule';}).sort(function(a,b){return a.date.localeCompare(b.date);});
  var lh='';
  if(!sorted.length)lh='<p class="empty-note">Aucune prestation</p>';
  sorted.forEach(function(p){
    var ds=new Date(p.date+'T12:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
    var bc=p.statut==='confirme'?'confirme':'attente';
    var bt=p.statut==='confirme'?'Confirmé':'En attente';
    var horaires=(p.hdebut&&p.hfin)?p.hdebut+' → '+p.hfin:'';
    lh+='<div class="presta-item '+bc+'">'
      +'<div class="presta-top"><span class="presta-type">'+p.type+'</span></div>'
      +'<div class="presta-row">📅 '+ds+(horaires?' · ⏰ '+horaires:'')+'</div>'
      +(p.ville?'<div class="presta-row">📍 '+p.ville+'</div>':'')
      +'<div><span class="badge '+bc+'">'+bt+'</span></div>'
      +'</div>';
  });
  document.getElementById('liste-prestations').innerHTML=lh;
}
 
// Écoute Firebase en temps réel
onValue(ref(db,'planning'), function(snapshot){
  var data=snapshot.val();
  document.getElementById('sync-status').textContent='Synchronisé ✓';
  if(data&&Array.isArray(data)){
    prestations=data;
    render();
  } else {
    prestations=[];
    render();
  }
}, function(error){
  document.getElementById('sync-status').textContent='Hors ligne';
});
 
render();
</script>
</body>
</html>
